spring.application.name=BackEnd

# Puerto Configuration
server.port=9000

# Credenciales y ruta de la base de datos
# F\u00edjate en el final de esta l\u00ednea
spring.datasource.url=jdbc:mysql://localhost:3306/atletas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password= 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------
# JPA / Hibernate
# ----------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=apiatleta@gmail.com
spring.mail.password=tu_token_de_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# ========================================
# CORS Configuration - IMPORTANTE
# ========================================
server.servlet.context-path=/
spring.web.cors.allowed-origins=http://localhost,http://127.0.0.1,http://localhost:*
spring.web.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false
spring.web.cors.max-age=3600


